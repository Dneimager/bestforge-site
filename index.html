<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>BestForge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🔥 BestForge</h1>
  <input type="text" id="search" placeholder="Buscar produtos...">
</header>

<nav id="categories"></nav>

<main>
  <div id="products"></div>
</main>

<!-- Modal -->
<div id="modal" class="hidden">
  <div class="modal-content">
    <span id="close">&times;</span>
    <img id="modal-img">
    <h2 id="modal-title"></h2>
    <p id="modal-price"></p>
    <p id="modal-desc"></p>
    <a id="whatsapp" target="_blank">WhatsApp</a>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
