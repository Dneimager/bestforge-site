<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BESTFORGE - Hardware & Tecnologia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <a href="#" class="logo">
                <span class="logo-icon">⚡</span>
                <span id="storeNameDisplay">BESTFORGE</span>
            </a>
            <div class="header-actions">
                <button class="cart-btn" onclick="toggleCart()">🛒 Carrinho <span id="cartCount">0</span></button>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h1 id="heroTitle">🚀 Hardware de Alta Performance</h1>
        <p id="heroDescription">Os melhores componentes para seu setup gamer.</p>
    </section>

    <!-- Site Normal -->
    <section class="products-container">
        <div class="categories">
            <button class="category-btn active" onclick="filterProducts('all', this)">Todos</button>
            <button class="category-btn" onclick="filterProducts('GPU', this)">GPU</button>
            <button class="category-btn" onclick="filterProducts('CPU', this)">CPU</button>
        </div>
        <div class="products-grid" id="productsGrid"></div>
    </section>

    <!-- PAINEL ADMINISTRATIVO (LATERAL) -->
    <div class="admin-fab" id="adminFab" onclick="toggleAdmin()">⚙️</div>
    <div class="admin-overlay" id="adminOverlay" onclick="toggleAdmin()"></div>
    
    <div class="admin-panel" id="adminPanel">
        <div class="admin-sidebar">
            <h2>⚙️ Painel Admin</h2>
            <nav class="admin-nav">
                <button onclick="switchTab('dashboard')">📊 Dashboard</button>
                <button onclick="switchTab('products')">📦 Produtos</button>
                <button onclick="switchTab('settings')">🎨 Aparência</button>
            </nav>
            <button class="btn-exit" onclick="toggleAdmin()">🚪 Sair</button>
        </div>
        
        <div class="admin-main">
            <!-- Tab Dashboard -->
            <div id="tab-dashboard" class="admin-tab active">
                <h3>Resumo</h3>
                <p>Total de Produtos: <span id="statProducts">0</span></p>
            </div>

            <!-- Tab Produtos -->
            <div id="tab-products" class="admin-tab">
                <button class="btn-add" onclick="openProductModal(null)">➕ Adicionar Produto</button>
                <div id="adminProductsList"></div>
            </div>

            <!-- Tab Aparência -->
            <div id="tab-settings" class="admin-tab">
                <h3>Customizar Site</h3>
                <label>Cor do Tema:</label>
                <input type="color" id="editPrimaryColor" onchange="applySettings()">
                <label>Nome da Loja:</label>
                <input type="text" id="editStoreName" oninput="applySettings()">
            </div>
        </div>
    </div>

    <!-- MODAL DE EDIÇÃO (O EDITOR) -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <h3 id="modalTitle">Novo Produto</h3>
            <div class="modal-body">
                <label>Nome:</label><input type="text" id="editProductName">
                <label>Categoria:</label>
                <select id="editProductCategory">
                    <option value="GPU">GPU</option>
                    <option value="CPU">CPU</option>
                </select>
                <label>URL da Imagem (Render):</label><input type="text" id="editProductImage">
                <label>Emoji (Ícone):</label><input type="text" id="editProductIcon">
                <label>Preço:</label><input type="number" id="editProductPrice">
                <label>Descrição:</label><textarea id="editProductDescription"></textarea>
            </div>
            <div class="modal-footer">
                <button onclick="closeModal()">Cancelar</button>
                <button class="btn-save" onclick="saveProduct()">💾 Salvar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
