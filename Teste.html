<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BESTFORGE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; }
        
        .admin-fab {
            position: fixed; bottom: 20px; left: 20px;
            width: 60px; height: 60px;
            background: #2d3436; color: white;
            border: none; border-radius: 50%;
            font-size: 24px; cursor: pointer;
            z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }
        
        .admin-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 10000;
            display: none;
        }
        
        .admin-overlay.show { display: block; }
        
        .admin-panel {
            position: fixed; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: white; z-index: 10001;
            transition: left 0.3s ease;
            padding: 20px;
        }
        
        .admin-panel.show { left: 0; }
        
        .close-btn {
            position: absolute; top: 20px; right: 20px;
            background: none; border: none;
            font-size: 24px; cursor: pointer;
        }
    </style>
</head>
<body>
    <h1 style="color: white; text-align: center; padding-top: 100px;">BESTFORGE</h1>
    <p style="color: white; text-align: center;">Clique no ⚙️ para abrir o admin</p>
    
    <button class="admin-fab" onclick="toggleAdmin()">⚙️</button>
    <div class="admin-overlay" id="overlay" onclick="toggleAdmin()"></div>
    
    <div class="admin-panel" id="panel">
        <button class="close-btn" onclick="toggleAdmin()">✕</button>
        <h2>⚙️ Painel Admin</h2>
        <p>✅ Funcionando!</p>
    </div>

    <script>
        function toggleAdmin() {
            console.log('Toggle admin');
            document.getElementById('panel').classList.toggle('show');
            document.getElementById('overlay').classList.toggle('show');
        }
        console.log('✅ Sistema pronto!');
    </script>
</body>
</html>
